<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your Reading with Barbara</title>
    <style>
      :root {
        --ink: #130a12;
        --plum: #2a1024;
        --plum-soft: #5a2645;
        --paper: #fffaf8;
        --vellum: #fffdf7;
        --cream: #fff0e9;
        --blush: #f5d6dc;
        --champagne: #f2dfb2;
        --brown: #3a2218;
        --olive: #725922;
        --gold: #d6b769;
        --gold-deep: #9d7826;
        --rose: #a84d65;
        --mist: rgba(253, 252, 251, 0.76);
        --line: rgba(191, 155, 48, 0.32);
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(115deg, rgba(245, 214, 220, 0.08) 0 1px, transparent 1px 26px),
          linear-gradient(155deg, #130a12, #2a1024 54%, #38172b);
        color: var(--paper);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .shell {
        width: min(1600px, 100%);
        margin: 0 auto;
        padding: 20px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        padding: 14px 0 18px;
        background: linear-gradient(180deg, rgba(22, 13, 22, 0.98), rgba(22, 13, 22, 0.7));
        backdrop-filter: blur(16px);
      }

      .brandline {
        display: flex;
        gap: 14px;
        align-items: center;
        min-width: 0;
      }

      .mark {
        display: grid;
        width: 44px;
        height: 44px;
        flex: 0 0 auto;
        place-items: center;
        border: 1px solid rgba(242, 223, 178, 0.55);
        border-radius: 50%;
        background: linear-gradient(145deg, rgba(255, 240, 233, 0.18), rgba(214, 183, 105, 0.14));
        color: var(--gold);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 22px;
      }

      h1,
      h2,
      h3,
      .serif {
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 500;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        color: var(--cream);
        font-size: clamp(1.5rem, 2.8vw, 2.35rem);
        line-height: 1.08;
      }

      .subtle {
        margin: 4px 0 0;
        color: rgba(253, 252, 251, 0.72);
        font-size: 0.95rem;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .btn {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid rgba(191, 155, 48, 0.36);
        border-radius: 8px;
        padding: 9px 12px;
        background: rgba(253, 252, 251, 0.08);
        color: var(--paper);
        font-weight: 700;
        text-decoration: none;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          background 160ms ease;
      }

      .btn:hover,
      .btn:focus-visible {
        transform: translateY(-1px);
        border-color: rgba(191, 155, 48, 0.75);
        background: rgba(253, 252, 251, 0.14);
        outline: none;
      }

      .btn.primary {
        border-color: var(--gold);
        background: linear-gradient(145deg, #f7e7c3, var(--gold));
        color: var(--brown);
        box-shadow: 0 10px 24px rgba(214, 183, 105, 0.22);
      }

      .studio {
        display: grid;
        grid-template-columns: minmax(360px, 0.82fr) minmax(420px, 1.18fr);
        gap: 20px;
        align-items: start;
      }

      .composer,
      .preview-wrap {
        border: 1px solid rgba(242, 223, 178, 0.24);
        border-radius: 8px;
        background: rgba(255, 250, 248, 0.08);
        box-shadow: var(--shadow);
      }

      .composer {
        overflow: clip;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid rgba(242, 223, 178, 0.18);
        padding: 16px 18px;
      }

      .panel-head h2 {
        margin: 0;
        color: var(--cream);
        font-size: 1.3rem;
      }

      .status {
        min-height: 20px;
        color: #e2d29a;
        font-size: 0.86rem;
      }

      .form-scroll {
        max-height: calc(100vh - 138px);
        overflow: auto;
        padding: 18px;
      }

      .section {
        margin: 0 0 18px;
        padding: 16px;
        border: 1px solid rgba(242, 223, 178, 0.18);
        border-radius: 8px;
        background: linear-gradient(145deg, rgba(255, 250, 248, 0.08), rgba(245, 214, 220, 0.05));
      }

      .section h3 {
        margin: 0 0 14px;
        color: var(--cream);
        font-size: 1.1rem;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field.wide {
        grid-column: 1 / -1;
      }

      label {
        color: rgba(253, 252, 251, 0.82);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid rgba(242, 223, 178, 0.26);
        border-radius: 8px;
        background: rgba(10, 6, 10, 0.44);
        color: var(--paper);
        padding: 10px 11px;
        outline: none;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
      }

      select {
        appearance: auto;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--gold);
        background: rgba(10, 6, 10, 0.62);
        box-shadow: 0 0 0 3px rgba(191, 155, 48, 0.2);
      }

      .card-editor {
        display: grid;
        gap: 12px;
        margin-top: 12px;
        padding: 13px;
        border: 1px solid rgba(214, 183, 105, 0.22);
        border-radius: 8px;
        background: rgba(255, 250, 248, 0.045);
      }

      .card-editor-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--cream);
      }

      .preview-wrap {
        position: sticky;
        top: 88px;
        overflow: hidden;
      }

      .preview-stage {
        max-height: calc(100vh - 108px);
        overflow: auto;
        padding: 18px;
        background:
          linear-gradient(90deg, rgba(242, 223, 178, 0.06) 1px, transparent 1px),
          linear-gradient(rgba(245, 214, 220, 0.055) 1px, transparent 1px);
        background-size: 26px 26px;
      }

      .email {
        width: min(860px, 100%);
        margin: 0 auto;
        overflow: hidden;
        border: 1px solid rgba(61, 47, 0, 0.12);
        border-radius: 8px;
        background: var(--paper);
        color: var(--brown);
        box-shadow: 0 20px 56px rgba(0, 0, 0, 0.28);
      }

      .email-hero {
        position: relative;
        padding: clamp(28px, 5vw, 54px);
        background:
          linear-gradient(rgba(168, 77, 101, 0.07) 1px, transparent 1px),
          linear-gradient(135deg, #fff7f4, var(--paper) 48%, var(--champagne));
        background-size: 100% 34px;
      }

      .kicker {
        margin: 0 0 10px;
        color: var(--gold-deep);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .email h2 {
        margin: 0;
        color: var(--brown);
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 0.98;
      }

      .title-divider {
        width: min(220px, 58%);
        height: 2px;
        margin-top: 20px;
        background: linear-gradient(90deg, var(--gold-deep), var(--gold), transparent);
      }

      .email h3 {
        margin: 0 0 14px;
        color: var(--brown);
        font-size: 1.55rem;
      }

      .email h4 {
        margin: 0;
        color: var(--brown);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.2rem;
        font-weight: 500;
      }

      .email p {
        margin: 0 0 12px;
      }

      .email-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 24px;
      }

      .pill {
        border: 1px solid rgba(191, 155, 48, 0.42);
        border-radius: 999px;
        background: rgba(255, 253, 243, 0.72);
        color: var(--olive);
        padding: 7px 10px;
        font-size: 0.82rem;
        font-weight: 800;
      }

      .email-section {
        padding: clamp(24px, 4vw, 40px);
        border-top: 1px solid rgba(61, 47, 0, 0.1);
      }

      .email-section.tint {
        background: #fffdf3;
      }

      .body-text {
        color: rgba(61, 47, 0, 0.84);
        font-size: 1rem;
      }

      .quote-block {
        border-left: 4px solid var(--gold);
        background: linear-gradient(135deg, rgba(245, 214, 220, 0.42), rgba(255, 253, 247, 0.82));
        padding: 18px;
        color: var(--brown);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.25rem;
        line-height: 1.42;
      }

      .theme-grid,
      .step-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .theme-card,
      .step-card {
        min-height: 100%;
        border: 1px solid rgba(61, 47, 0, 0.1);
        border-radius: 8px;
        background: linear-gradient(145deg, rgba(255, 250, 248, 0.96), rgba(255, 240, 233, 0.72));
        padding: 15px;
      }

      .theme-card strong,
      .step-card strong {
        display: block;
        margin-bottom: 6px;
        color: var(--rose);
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .reading-cards {
        display: grid;
        gap: 18px;
      }

      .reading-card {
        display: grid;
        grid-template-columns: 142px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
        padding: 16px;
        border: 1px solid rgba(61, 47, 0, 0.1);
        border-radius: 8px;
        background: linear-gradient(145deg, rgba(255, 250, 248, 0.92), rgba(255, 240, 233, 0.68));
        break-inside: avoid;
      }

      .tarot-card {
        position: relative;
        display: grid;
        width: 142px;
        aspect-ratio: 0.66;
        place-items: center;
        border: 1px solid rgba(191, 155, 48, 0.68);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(214, 183, 105, 0.2), transparent 42%),
          linear-gradient(145deg, #fffdf7, #fff0e9 52%, #f2dfb2);
        color: var(--brown);
        box-shadow: 0 16px 30px rgba(61, 47, 0, 0.16);
        text-align: center;
      }

      .tarot-card img {
        position: absolute;
        inset: 0;
        z-index: 2;
        width: 100%;
        height: 100%;
        border-radius: 8px;
        object-fit: cover;
      }

      .spread-photo {
        overflow: hidden;
        border: 1px dashed rgba(191, 155, 48, 0.58);
        border-radius: 8px;
        background: var(--vellum);
        text-align: center;
      }

      .spread-photo img {
        display: block;
        width: 100%;
        max-height: 520px;
        object-fit: cover;
      }

      .spread-placeholder {
        padding: 48px 24px;
      }

      .tarot-card.has-image::before,
      .tarot-card.has-image .tarot-symbol,
      .tarot-card.has-image .tarot-name {
        display: none;
      }

      .tarot-card::before {
        position: absolute;
        inset: 10px;
        border: 1px solid rgba(191, 155, 48, 0.52);
        border-radius: 6px;
        content: "";
      }

      .tarot-symbol {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 2.6rem;
        line-height: 1;
      }

      .tarot-name {
        position: absolute;
        right: 14px;
        bottom: 14px;
        left: 14px;
        font-size: 0.72rem;
        font-weight: 900;
        line-height: 1.15;
        text-transform: uppercase;
      }

      .card-copy p:last-child,
      .body-text p:last-child {
        margin-bottom: 0;
      }

      .closing {
        background:
          linear-gradient(135deg, rgba(58, 34, 24, 0.96), rgba(42, 16, 36, 0.96)),
          var(--brown);
        color: var(--paper);
      }

      .closing h3 {
        color: var(--cream);
      }

      .closing .body-text {
        color: rgba(253, 252, 251, 0.84);
      }

      .footer-note {
        border-top: 1px solid rgba(253, 247, 220, 0.18);
        padding-top: 18px;
        color: rgba(253, 252, 251, 0.62);
        font-size: 0.84rem;
      }

      @media (max-width: 1050px) {
        .topbar,
        .studio {
          grid-template-columns: 1fr;
        }

        .toolbar {
          justify-content: flex-start;
        }

        .preview-wrap {
          position: static;
        }

        .form-scroll,
        .preview-stage {
          max-height: none;
        }
      }

      @media (max-width: 680px) {
        .shell {
          padding: 12px;
        }

        .field-grid,
        .theme-grid,
        .step-grid,
        .reading-card {
          grid-template-columns: 1fr;
        }

        .toolbar {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        .btn {
          padding: 9px;
        }

        .tarot-card {
          width: 128px;
        }
      }

      @media print {
        @page {
          margin: 14mm;
          size: A4;
        }

        body {
          background: #fff;
        }

        body * {
          visibility: hidden;
        }

        #emailPreview,
        #emailPreview * {
          visibility: visible;
        }

        #emailPreview {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          border: 0;
          border-radius: 0;
          box-shadow: none;
        }

        .email-section,
        .email-hero {
          break-inside: avoid;
        }

        .reading-card {
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brandline">
          <div class="mark" aria-hidden="true">B</div>
          <div>
            <h1>Your Reading with Barbara</h1>
          </div>
        </div>
        <div class="toolbar" aria-label="Reading actions">
          <button class="btn" type="button" data-action="copy-link">Copy link</button>
          <button class="btn" type="button" data-action="copy-text">Copy email text</button>
          <button class="btn" type="button" data-action="copy-designed-email">Copy designed email</button>
          <button class="btn" type="button" data-action="mail">Open mail draft</button>
          <button class="btn primary" type="button" data-action="pdf">Download PDF</button>
        </div>
      </header>

      <div class="studio">
        <section class="composer" aria-label="Reading form">
          <div class="panel-head">
            <h2>Reading Details</h2>
            <div class="status" id="status" role="status" aria-live="polite"></div>
          </div>
          <form class="form-scroll" id="readingForm">
            <section class="section">
              <h3>Client</h3>
              <div class="field-grid">
                <div class="field">
                  <label for="clientName">Client / recipient name</label>
                  <input id="clientName" name="clientName" autocomplete="name" />
                </div>
                <div class="field">
                  <label for="recipientEmail">Recipient email</label>
                  <input id="recipientEmail" name="recipientEmail" type="email" autocomplete="email" />
                </div>
                <div class="field">
                  <label for="readerName">Reader name</label>
                  <input id="readerName" name="readerName" />
                </div>
                <div class="field">
                  <label for="readingDate">Reading date</label>
                  <input id="readingDate" name="readingDate" type="date" />
                </div>
              </div>
            </section>

            <section class="section">
              <h3>Reading</h3>
              <div class="field-grid">
                <div class="field">
                  <label for="deckName">Deck name</label>
                  <input id="deckName" name="deckName" />
                </div>
                <div class="field">
                  <label for="spreadName">Spread name</label>
                  <input id="spreadName" name="spreadName" />
                </div>
                <div class="field wide">
                  <label for="clientQuestion">Client question</label>
                  <textarea id="clientQuestion" name="clientQuestion"></textarea>
                </div>
                <div class="field wide">
                  <label for="intention">Intention for the reading</label>
                  <textarea id="intention" name="intention"></textarea>
                </div>
                <div class="field wide">
                  <label for="spreadPhoto">Your Cards</label>
                  <input id="spreadPhoto" name="spreadPhoto" type="file" accept="image/*" />
                </div>
              </div>
            </section>

            <section class="section">
              <h3>What the Cards Are Saying</h3>
              <datalist id="cardNameSuggestions"></datalist>
              <div id="cardEditors"></div>
            </section>

            <section class="section">
              <h3>Barbara's thoughts</h3>
              <div class="field-grid">
                <div class="field wide">
                  <label for="barbarasThoughts">Barbara's thoughts</label>
                  <textarea id="barbarasThoughts" name="barbarasThoughts"></textarea>
                </div>
              </div>
            </section>
          </form>
        </section>

        <section class="preview-wrap" aria-label="Live email preview">
          <div class="panel-head">
            <h2>Email Preview</h2>
            <div class="status">Live preview</div>
          </div>
          <div class="preview-stage">
            <article class="email" id="emailPreview"></article>
          </div>
        </section>
      </div>
    </main>

    <script>
      const cardImageFolder = "cards";

      const majorArcana = [
        "The Fool",
        "The Magician",
        "The High Priestess",
        "The Empress",
        "The Emperor",
        "The Hierophant",
        "The Lovers",
        "The Chariot",
        "Strength",
        "The Hermit",
        "Wheel of Fortune",
        "Justice",
        "The Hanged Man",
        "Death",
        "Temperance",
        "The Devil",
        "The Tower",
        "The Star",
        "The Moon",
        "The Sun",
        "Judgement",
        "The World"
      ];

      const suits = ["Wands", "Cups", "Swords", "Pentacles"];
      const ranks = [
        "Ace",
        "Two",
        "Three",
        "Four",
        "Five",
        "Six",
        "Seven",
        "Eight",
        "Nine",
        "Ten",
        "Page",
        "Knight",
        "Queen",
        "King"
      ];

      const cardSymbols = {
        "The Fool": "0",
        "The Magician": "I",
        "The High Priestess": "II",
        "The Empress": "III",
        "The Emperor": "IV",
        "The Hierophant": "V",
        "The Lovers": "VI",
        "The Chariot": "VII",
        Strength: "VIII",
        "The Hermit": "IX",
        "Wheel of Fortune": "X",
        Justice: "XI",
        "The Hanged Man": "XII",
        Death: "XIII",
        Temperance: "XIV",
        "The Devil": "XV",
        "The Tower": "XVI",
        "The Star": "XVII",
        "The Moon": "XVIII",
        "The Sun": "XIX",
        Judgement: "XX",
        "The World": "XXI"
      };

      const slugify = (value) =>
        String(value || "")
          .toLowerCase()
          .replace(/&/g, "and")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/(^-|-$)/g, "");

      const cardNames = [
        ...majorArcana,
        ...suits.flatMap((suit) => ranks.map((rank) => `${rank} of ${suit}`))
      ];

      const cardOptions = cardNames.map((name) => ({
        name,
        symbol: cardSymbols[name] || name.split(" ").slice(0, 2).map((part) => part[0]).join(""),
        image: `${cardImageFolder}/${slugify(name)}.jpg`
      }));

      const positionLabels = [
        "Root energy",
        "Visible situation",
        "Block",
        "Support",
        "Action",
        "Likely outcome"
      ];

      const today = new Date().toISOString().slice(0, 10);

      const defaultState = {
        clientName: "Amelia",
        recipientEmail: "amelia@example.com",
        readerName: "Barbara Ford-Hammond",
        readingDate: today,
        deckName: "Placeholder Tarot Deck",
        spreadName: "Six Position Clarity Spread",
        clientQuestion: "What do I need to understand about the change I can feel coming?",
        intention:
          "To offer grounded guidance, emotional clarity, and one practical next step that can be carried into the week.",
        spreadPhotoDataUrl: "",
        spreadPhotoName: "",
        barbarasThoughts: "",
        cards: positionLabels.map((label, index) => ({
          label,
          card: cardOptions[index % cardOptions.length].name,
          interpretation:
            [
              "The root is intuition before explanation. You already know more than you have let yourself name.",
              "The visible situation is softer than it first appears. Growth is present, but it wants care and pacing.",
              "The block is uncertainty that pulls the eye into shadows. Not every unknown is a warning.",
              "Support arrives through balance, patience, and refusing to make one feeling carry the whole truth.",
              "The action is emotional honesty. Begin with the smallest choice that lets your heart breathe.",
              "The likely outcome is steadier ground, especially if you choose what lasts over what merely distracts."
            ][index]
        }))
      };

      const saved = (() => {
        try {
          return JSON.parse(localStorage.getItem("tarotEmailDemoState") || "null");
        } catch (error) {
          return null;
        }
      })();

      let state = saved && saved.cards ? saved : defaultState;

      const form = document.querySelector("#readingForm");
      const statusEl = document.querySelector("#status");
      const cardEditors = document.querySelector("#cardEditors");
      const preview = document.querySelector("#emailPreview");

      const fieldNames = [
        "clientName",
        "recipientEmail",
        "readerName",
        "readingDate",
        "deckName",
        "spreadName",
        "clientQuestion",
        "intention",
        "barbarasThoughts"
      ];

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function paragraphs(value) {
        const text = String(value || "").trim();
        if (!text) return "<p></p>";
        return text
          .split(/\n{2,}/)
          .map((line) => `<p>${escapeHtml(line).replace(/\n/g, "<br>")}</p>`)
          .join("");
      }

      function sentenceList(value) {
        return String(value || "")
          .split(/[.;]\s+|\n+/)
          .map((item) => item.trim())
          .filter(Boolean)
          .slice(0, 3);
      }

      function findCard(name) {
        const typedName = String(name || "").trim() || "Untitled card";
        const knownCard = cardOptions.find(
          (card) => card.name.toLowerCase() === typedName.toLowerCase()
        );
        if (knownCard) return knownCard;

        return {
          name: typedName,
          symbol:
            typedName
              .split(/\s+/)
              .map((part) => part[0])
              .join("")
              .slice(0, 3)
              .toUpperCase() || "*",
          image: `${cardImageFolder}/${slugify(typedName)}.jpg`
        };
      }

      function formatDate(value) {
        if (!value) return "";
        const date = new Date(`${value}T12:00:00`);
        return date.toLocaleDateString("en-GB", {
          day: "numeric",
          month: "long",
          year: "numeric"
        });
      }

      function setStatus(message) {
        statusEl.textContent = message;
        window.clearTimeout(setStatus.timer);
        setStatus.timer = window.setTimeout(() => {
          statusEl.textContent = "";
        }, 2400);
      }

      function saveState() {
        localStorage.setItem("tarotEmailDemoState", JSON.stringify(state));
      }

      function bindFields() {
        document.querySelector("#cardNameSuggestions").innerHTML = cardOptions
          .map((option) => `<option value="${escapeHtml(option.name)}"></option>`)
          .join("");

        fieldNames.forEach((name) => {
          const input = form.elements[name];
          input.value = state[name] || "";
          input.addEventListener("input", () => {
            state = { ...state, [name]: input.value };
            saveState();
            renderPreview();
          });
        });

        const spreadPhoto = form.elements.spreadPhoto;
        spreadPhoto.addEventListener("change", () => {
          const file = spreadPhoto.files && spreadPhoto.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            state = {
              ...state,
              spreadPhotoDataUrl: String(reader.result || ""),
              spreadPhotoName: file.name
            };
            saveState();
            renderPreview();
            setStatus("Photo added");
          };
          reader.readAsDataURL(file);
        });
      }

      function renderCardEditors() {
        cardEditors.innerHTML = state.cards
          .map(
            (card, index) => `
              <div class="card-editor" data-card-index="${index}">
                <div class="card-editor-title">
                  <strong>${escapeHtml(card.label)}</strong>
                  <span>${index + 1} of ${state.cards.length}</span>
                </div>
                <div class="field-grid">
                  <div class="field">
                    <label for="card-${index}-label">Position label</label>
                    <input id="card-${index}-label" data-card-field="label" value="${escapeHtml(card.label)}" />
                  </div>
                  <div class="field">
                    <label for="card-${index}-card">Card name</label>
                    <input id="card-${index}-card" list="cardNameSuggestions" data-card-field="card" value="${escapeHtml(card.card)}" />
                  </div>
                  <div class="field wide">
                    <label for="card-${index}-interpretation">Interpretation</label>
                    <textarea id="card-${index}-interpretation" data-card-field="interpretation">${escapeHtml(card.interpretation)}</textarea>
                  </div>
                </div>
              </div>
            `
          )
          .join("");

        cardEditors.querySelectorAll("[data-card-field]").forEach((input) => {
          input.addEventListener("input", () => {
            const cardBox = input.closest("[data-card-index]");
            const index = Number(cardBox.dataset.cardIndex);
            state.cards[index][input.dataset.cardField] = input.value;
            saveState();
            renderPreview();
          });
        });
      }

      function renderPreview() {
        preview.innerHTML = `
          <header class="email-hero">
            <h2>Your Reading with Barbara</h2>
            <div class="title-divider" style="width: min(220px, 58%); height: 2px; margin-top: 20px; background: linear-gradient(90deg, #8a6a16, #d9bb67, transparent);" aria-hidden="true"></div>
          </header>

          <section class="email-section tint">
            <h3>Query or Question</h3>
            <div class="quote-block">${escapeHtml(state.clientQuestion)}</div>
          </section>

          <section class="email-section">
            <h3>Intention</h3>
            <div class="body-text">${paragraphs(state.intention)}</div>
          </section>

          <section class="email-section tint">
            <h3>Your Cards</h3>
            <div class="spread-photo">
              ${
                state.spreadPhotoDataUrl
                  ? `<img src="${state.spreadPhotoDataUrl}" alt="Your Cards" />`
                  : `<div class="spread-placeholder"><p>Your Cards</p></div>`
              }
            </div>
          </section>

          <section class="email-section">
            <h3>What the Cards Are Saying</h3>
            <div class="reading-cards">
              ${state.cards
                .map(
                  (card, index) => `
                    <article class="reading-card">
                      <div class="card-copy">
                        <p class="kicker">${index + 1}. ${escapeHtml(card.label)}</p>
                        <h4>${escapeHtml(card.card)}</h4>
                        ${paragraphs(card.interpretation)}
                      </div>
                    </article>
                  `
                )
                .join("")}
            </div>
          </section>

          <section class="email-section">
            <h3>Barbara's thoughts</h3>
            <div class="body-text">${paragraphs(state.barbarasThoughts)}</div>
          </section>
        `;
      }

      function buildEmailText() {
        const cardText = state.cards
          .map(
            (card, index) =>
              `${index + 1}. ${card.label}: ${card.card}\n${card.interpretation}`
          )
          .join("\n\n");

        return [
          "Your Reading with Barbara",
          `For: ${state.clientName}`,
          `Date: ${formatDate(state.readingDate)}`,
          `Reader: ${state.readerName}`,
          `Deck: ${state.deckName}`,
          `Spread: ${state.spreadName}`,
          "",
          "Question",
          state.clientQuestion,
          "",
          "Intention",
          state.intention,
          "",
          "What the Cards Are Saying",
          cardText,
          "",
          "Barbara's thoughts",
          state.barbarasThoughts
        ].join("\n");
      }

      function downloadFile(filename, content, type) {
        const blob = new Blob([content], { type });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        link.click();
        URL.revokeObjectURL(url);
      }

      function buildDesignedEmailHtml() {
        const styles = document.querySelector("style").textContent;
        return `<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your Reading with Barbara</title>
    <style>
      ${styles}
      body {
        background: #fdf7dc;
        padding: 24px;
      }
      .email {
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    ${preview.outerHTML}
  </body>
</html>`;
      }

      async function copyDesignedEmail() {
        const range = document.createRange();
        range.selectNode(preview);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        const copied = document.execCommand("copy");
        selection.removeAllRanges();

        if (!copied && navigator.clipboard && window.ClipboardItem) {
          await navigator.clipboard.write([
            new ClipboardItem({
              "text/html": new Blob([preview.outerHTML], { type: "text/html" }),
              "text/plain": new Blob([buildEmailText()], { type: "text/plain" })
            })
          ]);
        }
      }

      function pdfEscape(value) {
        return String(value || "")
          .replace(/\\/g, "\\\\")
          .replace(/\(/g, "\\(")
          .replace(/\)/g, "\\)")
          .replace(/[\r\n]+/g, " ");
      }

      function wrapPdfText(text, maxChars) {
        const words = String(text || " ").split(/\s+/).filter(Boolean);
        const lines = [];
        let line = "";
        words.forEach((word) => {
          const next = line ? `${line} ${word}` : word;
          if (next.length > maxChars && line) {
            lines.push(line);
            line = word;
          } else {
            line = next;
          }
        });
        if (line) lines.push(line);
        return lines.length ? lines : [" "];
      }

      function jpegBytesFromDataUrl(dataUrl) {
        if (!dataUrl || !dataUrl.startsWith("data:image/jpeg")) return null;
        const binary = atob(dataUrl.split(",")[1] || "");
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
        return bytes;
      }

      async function imageSize(dataUrl) {
        return new Promise((resolve) => {
          if (!dataUrl) return resolve(null);
          const image = new Image();
          image.onload = () => resolve({ width: image.naturalWidth || image.width, height: image.naturalHeight || image.height });
          image.onerror = () => resolve(null);
          image.src = dataUrl;
        });
      }

      function bytesToBinary(bytes) {
        let output = "";
        const chunk = 8192;
        for (let index = 0; index < bytes.length; index += chunk) {
          output += String.fromCharCode.apply(null, bytes.subarray(index, index + chunk));
        }
        return output;
      }

      async function makePdfBlob() {
        const pageWidth = 595;
        const pageHeight = 842;
        const margin = 52;
        const contentWidth = pageWidth - margin * 2;
        const pages = [];
        let ops = [];
        let y = 0;

        const newPage = () => {
          if (ops.length) pages.push(ops.join("\n"));
          ops = ["0.992 0.969 0.863 rg", `0 0 ${pageWidth} ${pageHeight} re f`, "0.839 0.718 0.412 RG", `28 28 ${pageWidth - 56} ${pageHeight - 56} re S`];
          y = pageHeight - margin;
        };
        const text = (value, x, size, font = "F1") => {
          ops.push(`BT /${font} ${size} Tf ${x} ${y} Td (${pdfEscape(value)}) Tj ET`);
        };
        const wrapped = (value, x, size, lineHeight, maxChars, font = "F1") => {
          wrapPdfText(value, maxChars).forEach((line) => {
            if (y < margin + 32) newPage();
            text(line, x, size, font);
            y -= lineHeight;
          });
        };
        const heading = (value) => {
          if (y < margin + 44) newPage();
          ops.push("0.227 0.133 0.094 rg");
          text(value, margin, 18, "F2");
          ops.push("0.227 0.133 0.094 rg");
          y -= 22;
        };

        newPage();
        ops.push("0.227 0.133 0.094 rg", `0 ${pageHeight - 92} ${pageWidth} 92 re f`, "1 0.98 0.973 rg");
        y = pageHeight - 54;
        text("Your Reading with Barbara", margin, 28, "F2");
        y = pageHeight - 124;

        heading("Query or Question");
        wrapped(state.clientQuestion, margin, 11, 15, 86);
        y -= 10;
        heading("Intention");
        wrapped(state.intention, margin, 11, 15, 86);
        y -= 12;

        heading("Your Cards");
        const jpegBytes = jpegBytesFromDataUrl(state.spreadPhotoDataUrl);
        const size = await imageSize(state.spreadPhotoDataUrl);
        let imageObjectNumber = null;
        let imageMeta = null;
        if (jpegBytes && size) {
          imageMeta = { bytes: jpegBytes, width: size.width, height: size.height };
          const boxW = contentWidth;
          const boxH = 190;
          if (y - boxH < margin) newPage();
          const ratio = Math.min(boxW / size.width, boxH / size.height);
          const drawW = size.width * ratio;
          const drawH = size.height * ratio;
          const drawX = margin + (boxW - drawW) / 2;
          const drawY = y - drawH;
          ops.push("q", `${drawW} 0 0 ${drawH} ${drawX} ${drawY} cm`, "/Im1 Do", "Q");
          y -= boxH + 16;
        } else {
          if (y - 88 < margin) newPage();
          ops.push("1 0.992 0.969 rg", `${margin} ${y - 80} ${contentWidth} 80 re f`);
          y -= 42;
          text("Your Cards", 260, 14, "F2");
          y -= 58;
        }

        heading("What the Cards Are Saying");
        state.cards.forEach((card, index) => {
          if (y < margin + 52) newPage();
          ops.push("0.616 0.471 0.149 rg");
          text(`${index + 1}. ${card.label}: ${card.card}`, margin, 12, "F1");
          y -= 17;
          ops.push("0.227 0.133 0.094 rg");
          wrapped(card.interpretation, margin, 10, 14, 90);
          y -= 9;
        });

        heading("Barbara's thoughts");
        wrapped(state.barbarasThoughts, margin, 11, 15, 86);
        pages.push(ops.join("\n"));

        const objects = [];
        const addObject = (content) => {
          objects.push(content);
          return objects.length;
        };
        const catalogNumber = addObject("<< /Type /Catalog /Pages 2 0 R >>");
        const pagesNumber = addObject("PAGES_PLACEHOLDER");
        const font1Number = addObject("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>");
        const font2Number = addObject("<< /Type /Font /Subtype /Type1 /BaseFont /Times-Roman >>");
        if (imageMeta) {
          imageObjectNumber = addObject(`<< /Type /XObject /Subtype /Image /Width ${imageMeta.width} /Height ${imageMeta.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${imageMeta.bytes.length} >>\nstream\n${bytesToBinary(imageMeta.bytes)}\nendstream`);
        }
        const pageNumbers = [];
        pages.forEach((pageOps) => {
          const contentNumber = addObject(`<< /Length ${pageOps.length} >>\nstream\n${pageOps}\nendstream`);
          const xObject = imageObjectNumber ? `/XObject << /Im1 ${imageObjectNumber} 0 R >>` : "";
          const pageNumber = addObject(`<< /Type /Page /Parent ${pagesNumber} 0 R /MediaBox [0 0 ${pageWidth} ${pageHeight}] /Resources << /Font << /F1 ${font1Number} 0 R /F2 ${font2Number} 0 R >> ${xObject} >> /Contents ${contentNumber} 0 R >>`);
          pageNumbers.push(pageNumber);
        });
        objects[pagesNumber - 1] = `<< /Type /Pages /Kids [${pageNumbers.map((number) => `${number} 0 R`).join(" ")}] /Count ${pageNumbers.length} >>`;

        let pdf = "%PDF-1.4\n";
        const offsets = [0];
        objects.forEach((object, index) => {
          offsets.push(pdf.length);
          pdf += `${index + 1} 0 obj\n${object}\nendobj\n`;
        });
        const xref = pdf.length;
        pdf += `xref\n0 ${objects.length + 1}\n0000000000 65535 f \n`;
        offsets.slice(1).forEach((offset) => {
          pdf += `${String(offset).padStart(10, "0")} 00000 n \n`;
        });
        pdf += `trailer\n<< /Size ${objects.length + 1} /Root ${catalogNumber} 0 R >>\nstartxref\n${xref}\n%%EOF`;
        const bytes = new Uint8Array(pdf.length);
        for (let index = 0; index < pdf.length; index += 1) bytes[index] = pdf.charCodeAt(index) & 255;
        return new Blob([bytes], { type: "application/pdf" });
      }

      async function downloadPdfFile() {
        setStatus("Creating PDF...");
        const blob = await makePdfBlob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "your-reading-with-barbara.pdf";
        link.click();
        URL.revokeObjectURL(url);
        setStatus("PDF downloaded");
      }

      async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const area = document.createElement("textarea");
        area.value = text;
        area.setAttribute("readonly", "");
        area.style.position = "fixed";
        area.style.opacity = "0";
        document.body.append(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }

      document.querySelector('[data-action="copy-link"]').addEventListener("click", async () => {
        await copyText(window.location.href);
        setStatus("Link copied");
      });

      document.querySelector('[data-action="copy-text"]').addEventListener("click", async () => {
        await copyText(buildEmailText());
        setStatus("Email text copied");
      });

      document.querySelector('[data-action="copy-designed-email"]').addEventListener("click", async () => {
        await copyDesignedEmail();
        setStatus("Designed email copied");
      });

      document.querySelector('[data-action="mail"]').addEventListener("click", () => {
        const subject = encodeURIComponent("Your Reading with Barbara");
        const body = encodeURIComponent(buildEmailText());
        const email = encodeURIComponent(state.recipientEmail || "");
        window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
      });

      document.querySelector('[data-action="pdf"]').addEventListener("click", () => {
        downloadPdfFile();
      });

      bindFields();
      renderCardEditors();
      renderPreview();
    </script>
  </body>
</html>

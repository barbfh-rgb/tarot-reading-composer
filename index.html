<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your Reading with Barbara</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Gabriela&family=Nunito:wght@400;600;700;800;900&display=swap");

      :root {
        --ink: #130a12;
        --plum: #2a1024;
        --plum-soft: #5a2645;
        --paper: #fffaf8;
        --vellum: #fffdf7;
        --cream: #fff0e9;
        --blush: #f5d6dc;
        --champagne: #f2dfb2;
        --brown: #3a2218;
        --olive: #725922;
        --gold: #d6b769;
        --gold-deep: #9d7826;
        --rose: #a84d65;
        --mist: rgba(253, 252, 251, 0.76);
        --line: rgba(191, 155, 48, 0.32);
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(115deg, rgba(245, 214, 220, 0.08) 0 1px, transparent 1px 26px),
          linear-gradient(155deg, #130a12, #2a1024 54%, #38172b);
        color: var(--paper);
        font-family:
          "Nunito", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .shell {
        width: min(1600px, 100%);
        margin: 0 auto;
        padding: 20px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        padding: 14px 0 18px;
        background: linear-gradient(180deg, rgba(22, 13, 22, 0.98), rgba(22, 13, 22, 0.7));
        backdrop-filter: blur(16px);
      }

      .brandline {
        display: flex;
        gap: 14px;
        align-items: center;
        min-width: 0;
      }

      .mark {
        display: grid;
        width: 44px;
        height: 44px;
        flex: 0 0 auto;
        place-items: center;
        border: 1px solid rgba(242, 223, 178, 0.55);
        border-radius: 50%;
        background: linear-gradient(145deg, rgba(255, 240, 233, 0.18), rgba(214, 183, 105, 0.14));
        color: var(--gold);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 22px;
      }

      h1,
      h2,
      h3,
      .serif {
        font-family: "Gabriela", Georgia, "Times New Roman", serif;
        font-weight: 500;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        color: var(--cream);
        font-size: clamp(1.5rem, 2.8vw, 2.35rem);
        line-height: 1.08;
      }

      .subtle {
        margin: 4px 0 0;
        color: rgba(253, 252, 251, 0.72);
        font-size: 0.95rem;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .btn {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid rgba(191, 155, 48, 0.36);
        border-radius: 8px;
        padding: 9px 12px;
        background: rgba(253, 252, 251, 0.08);
        color: var(--paper);
        font-weight: 700;
        text-decoration: none;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          background 160ms ease;
      }

      .btn:hover,
      .btn:focus-visible {
        transform: translateY(-1px);
        border-color: rgba(191, 155, 48, 0.75);
        background: rgba(253, 252, 251, 0.14);
        outline: none;
      }

      .btn.primary {
        border-color: var(--gold);
        background: linear-gradient(145deg, #f7e7c3, var(--gold));
        color: var(--brown);
        box-shadow: 0 10px 24px rgba(214, 183, 105, 0.22);
      }

      .studio {
        display: grid;
        grid-template-columns: minmax(360px, 0.82fr) minmax(420px, 1.18fr);
        gap: 20px;
        align-items: start;
      }

      .composer,
      .preview-wrap {
        border: 1px solid rgba(242, 223, 178, 0.24);
        border-radius: 8px;
        background: rgba(255, 250, 248, 0.08);
        box-shadow: var(--shadow);
      }

      .composer {
        overflow: clip;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid rgba(242, 223, 178, 0.18);
        padding: 16px 18px;
      }

      .panel-head h2 {
        margin: 0;
        color: var(--cream);
        font-size: 1.3rem;
      }

      .status {
        min-height: 20px;
        color: #e2d29a;
        font-size: 0.86rem;
      }

      .form-scroll {
        max-height: calc(100vh - 138px);
        overflow: auto;
        padding: 18px;
      }

      .section {
        margin: 0 0 18px;
        padding: 16px;
        border: 1px solid rgba(242, 223, 178, 0.18);
        border-radius: 8px;
        background: linear-gradient(145deg, rgba(255, 250, 248, 0.08), rgba(245, 214, 220, 0.05));
      }

      .section h3 {
        margin: 0 0 14px;
        color: var(--cream);
        font-size: 1.1rem;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field.wide {
        grid-column: 1 / -1;
      }

      label {
        color: rgba(253, 252, 251, 0.82);
        font-family: "Gabriela", Georgia, "Times New Roman", serif;
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid rgba(242, 223, 178, 0.26);
        border-radius: 8px;
        background: rgba(10, 6, 10, 0.44);
        color: var(--paper);
        padding: 10px 11px;
        outline: none;
        transition:
          border-color 160ms ease,
          box-shadow 160ms ease,
          background 160ms ease;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
      }

      select {
        appearance: auto;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--gold);
        background: rgba(10, 6, 10, 0.62);
        box-shadow: 0 0 0 3px rgba(191, 155, 48, 0.2);
      }

      .card-editor {
        display: grid;
        gap: 12px;
        margin-top: 12px;
        padding: 13px;
        border: 1px solid rgba(214, 183, 105, 0.22);
        border-radius: 8px;
        background: rgba(255, 250, 248, 0.045);
      }

      .card-editor-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--cream);
      }

      .preview-wrap {
        position: sticky;
        top: 88px;
        overflow: hidden;
      }

      .preview-stage {
        max-height: calc(100vh - 108px);
        overflow: auto;
        padding: 18px;
        background:
          linear-gradient(90deg, rgba(242, 223, 178, 0.06) 1px, transparent 1px),
          linear-gradient(rgba(245, 214, 220, 0.055) 1px, transparent 1px);
        background-size: 26px 26px;
      }

      .email {
        width: min(860px, 100%);
        margin: 0 auto;
        overflow: hidden;
        border: 1px solid rgba(61, 47, 0, 0.12);
        border-radius: 8px;
        background: var(--paper);
        color: var(--brown);
        box-shadow: 0 20px 56px rgba(0, 0, 0, 0.28);
      }

      .email-hero {
        position: relative;
        padding: clamp(28px, 5vw, 54px);
        background:
          linear-gradient(rgba(168, 77, 101, 0.07) 1px, transparent 1px),
          linear-gradient(135deg, #fff7f4, var(--paper) 48%, var(--champagne));
        background-size: 100% 34px;
        text-align: center;
      }

      .header-emblem {
        display: block;
        width: clamp(104px, 18vw, 156px);
        height: auto;
        margin: 0 auto 18px;
        border: 1px solid rgba(191, 155, 48, 0.44);
        border-radius: 50%;
        box-shadow: 0 16px 38px rgba(61, 47, 0, 0.18);
      }

      .kicker {
        margin: 0 0 10px;
        color: var(--gold-deep);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .email h2 {
        margin: 0;
        color: var(--brown);
        font-size: clamp(3rem, 7vw, 5.7rem);
        line-height: 0.98;
      }

      .title-divider {
        width: min(220px, 58%);
        height: 2px;
        margin: 20px auto 0;
        background: linear-gradient(90deg, var(--gold-deep), var(--gold), transparent);
      }

      .email h3 {
        margin: 0 0 14px;
        color: var(--brown);
        font-size: 1.55rem;
      }

      .email h4 {
        margin: 0;
        color: var(--brown);
        font-family: "Gabriela", Georgia, "Times New Roman", serif;
        font-size: 1.2rem;
        font-weight: 500;
      }

      .email p {
        margin: 0 0 12px;
      }

      .email-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 24px;
      }

      .pill {
        border: 1px solid rgba(191, 155, 48, 0.42);
        border-radius: 999px;
        background: rgba(255, 253, 243, 0.72);
        color: var(--olive);
        padding: 7px 10px;
        font-size: 0.82rem;
        font-weight: 800;
      }

      .email-section {
        padding: clamp(24px, 4vw, 40px);
        border-top: 1px solid rgba(61, 47, 0, 0.1);
      }

      .email-section.tint {
        background: #fffdf3;
      }

      .body-text {
        color: rgba(61, 47, 0, 0.84);
        font-family: "Nunito", Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: 1rem;
      }

      .quote-block {
        border-left: 4px solid var(--gold);
        background: linear-gradient(135deg, rgba(245, 214, 220, 0.42), rgba(255, 253, 247, 0.82));
        padding: 18px;
        color: var(--brown);
        font-family: "Nunito", Inter, ui-sans-serif, system-ui, sans-serif;
        font-size: 1.25rem;
        line-height: 1.42;
      }

      .theme-grid,
      .step-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .theme-card,
      .step-card {
        min-height: 100%;
        border: 1px solid rgba(61, 47, 0, 0.1);
        border-radius: 8px;
        background: linear-gradient(145deg, rgba(255, 250, 248, 0.96), rgba(255, 240, 233, 0.72));
        padding: 15px;
      }

      .theme-card strong,
      .step-card strong {
        display: block;
        margin-bottom: 6px;
        color: var(--rose);
        font-family: "Gabriela", Georgia, "Times New Roman", serif;
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .reading-cards {
        display: grid;
        gap: 18px;
      }

      .reading-card {
        display: grid;
        grid-template-columns: 142px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
        padding: 16px;
        border: 1px solid rgba(61, 47, 0, 0.1);
        border-radius: 8px;
        background: linear-gradient(145deg, rgba(255, 250, 248, 0.92), rgba(255, 240, 233, 0.68));
        break-inside: avoid;
      }

      .tarot-card {
        position: relative;
        display: grid;
        width: 142px;
        aspect-ratio: 0.66;
        place-items: center;
        border: 1px solid rgba(191, 155, 48, 0.68);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(214, 183, 105, 0.2), transparent 42%),
          linear-gradient(145deg, #fffdf7, #fff0e9 52%, #f2dfb2);
        color: var(--brown);
        box-shadow: 0 16px 30px rgba(61, 47, 0, 0.16);
        text-align: center;
      }

      .tarot-card img {
        position: absolute;
        inset: 0;
        z-index: 2;
        width: 100%;
        height: 100%;
        border-radius: 8px;
        object-fit: cover;
      }

      .spread-photo {
        overflow: hidden;
        border: 1px dashed rgba(191, 155, 48, 0.58);
        border-radius: 8px;
        background: var(--vellum);
        text-align: center;
      }

      .spread-photo img {
        display: block;
        width: 100%;
        max-height: 520px;
        object-fit: cover;
      }

      .spread-placeholder {
        padding: 48px 24px;
      }

      .tarot-card.has-image::before,
      .tarot-card.has-image .tarot-symbol,
      .tarot-card.has-image .tarot-name {
        display: none;
      }

      .tarot-card::before {
        position: absolute;
        inset: 10px;
        border: 1px solid rgba(191, 155, 48, 0.52);
        border-radius: 6px;
        content: "";
      }

      .tarot-symbol {
        font-family: "Gabriela", Georgia, "Times New Roman", serif;
        font-size: 2.6rem;
        line-height: 1;
      }

      .tarot-name {
        position: absolute;
        right: 14px;
        bottom: 14px;
        left: 14px;
        font-size: 0.72rem;
        font-weight: 900;
        line-height: 1.15;
        text-transform: uppercase;
      }

      .card-copy p:last-child,
      .body-text p:last-child {
        margin-bottom: 0;
      }

      .closing {
        background:
          linear-gradient(135deg, rgba(58, 34, 24, 0.96), rgba(42, 16, 36, 0.96)),
          var(--brown);
        color: var(--paper);
      }

      .closing h3 {
        color: var(--cream);
      }

      .closing .body-text {
        color: rgba(253, 252, 251, 0.84);
      }

      .footer-note {
        border-top: 1px solid rgba(253, 247, 220, 0.18);
        padding-top: 18px;
        color: rgba(253, 252, 251, 0.62);
        font-size: 0.84rem;
      }

      @media (max-width: 1050px) {
        .topbar,
        .studio {
          grid-template-columns: 1fr;
        }

        .toolbar {
          justify-content: flex-start;
        }

        .preview-wrap {
          position: static;
        }

        .form-scroll,
        .preview-stage {
          max-height: none;
        }
      }

      @media (max-width: 680px) {
        .shell {
          padding: 12px;
        }

        .field-grid,
        .theme-grid,
        .step-grid,
        .reading-card {
          grid-template-columns: 1fr;
        }

        .toolbar {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }

        .btn {
          padding: 9px;
        }

        .tarot-card {
          width: 128px;
        }
      }

      @media print {
        @page {
          margin: 14mm;
          size: A4;
        }

        body {
          background: #fff;
        }

        body * {
          visibility: hidden;
        }

        #emailPreview,
        #emailPreview * {
          visibility: visible;
        }

        #emailPreview {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          border: 0;
          border-radius: 0;
          box-shadow: none;
        }

        .email-section,
        .email-hero {
          break-inside: avoid;
        }

        .reading-card {
          break-inside: avoid;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brandline">
          <div class="mark" aria-hidden="true">B</div>
          <div>
            <h1>Your Reading with Barbara</h1>
          </div>
        </div>
        <div class="toolbar" aria-label="Reading actions">
          <button class="btn" type="button" data-action="copy-link">Copy link</button>
          <button class="btn" type="button" data-action="copy-text">Copy email text</button>
          <button class="btn" type="button" data-action="copy-designed-email">Copy designed email</button>
          <button class="btn" type="button" data-action="mail">Open mail draft</button>
          <button class="btn primary" type="button" data-action="pdf">Download PDF</button>
        </div>
      </header>

      <div class="studio">
        <section class="composer" aria-label="Reading form">
          <div class="panel-head">
            <h2>Reading Details</h2>
            <div class="status" id="status" role="status" aria-live="polite"></div>
          </div>
          <form class="form-scroll" id="readingForm">
            <section class="section">
              <h3>Client</h3>
              <div class="field-grid">
                <div class="field">
                  <label for="clientName">Client / recipient name</label>
                  <input id="clientName" name="clientName" autocomplete="name" />
                </div>
                <div class="field">
                  <label for="recipientEmail">Recipient email</label>
                  <input id="recipientEmail" name="recipientEmail" type="email" autocomplete="email" />
                </div>
                <div class="field">
                  <label for="readerName">Reader name</label>
                  <input id="readerName" name="readerName" />
                </div>
                <div class="field">
                  <label for="readingDate">Reading date</label>
                  <input id="readingDate" name="readingDate" type="date" />
                </div>
              </div>
            </section>

            <section class="section">
              <h3>Reading</h3>
              <div class="field-grid">
                <div class="field">
                  <label for="deckName">Deck name</label>
                  <input id="deckName" name="deckName" />
                </div>
                <div class="field">
                  <label for="spreadName">Spread name</label>
                  <input id="spreadName" name="spreadName" />
                </div>
                <div class="field wide">
                  <label for="clientQuestion">Client question</label>
                  <textarea id="clientQuestion" name="clientQuestion"></textarea>
                </div>
                <div class="field wide">
                  <label for="intention">Intention for the reading</label>
                  <textarea id="intention" name="intention"></textarea>
                </div>
                <div class="field wide">
                  <label for="spreadPhoto">Your Cards</label>
                  <input id="spreadPhoto" name="spreadPhoto" type="file" accept="image/*" />
                </div>
              </div>
            </section>

            <section class="section">
              <h3>What the Cards Are Saying</h3>
              <datalist id="cardNameSuggestions"></datalist>
              <div id="cardEditors"></div>
            </section>

            <section class="section">
              <h3>Barbara's thoughts</h3>
              <div class="field-grid">
                <div class="field wide">
                  <label for="barbarasThoughts">Barbara's thoughts</label>
                  <textarea id="barbarasThoughts" name="barbarasThoughts"></textarea>
                </div>
              </div>
            </section>
          </form>
        </section>

        <section class="preview-wrap" aria-label="Live email preview">
          <div class="panel-head">
            <h2>Email Preview</h2>
            <div class="status">Live preview</div>
          </div>
          <div class="preview-stage">
            <article class="email" id="emailPreview"></article>
          </div>
        </section>
      </div>
    </main>

    <script>
      const cardImageFolder = "cards";

      const majorArcana = [
        "The Fool",
        "The Magician",
        "The High Priestess",
        "The Empress",
        "The Emperor",
        "The Hierophant",
        "The Lovers",
        "The Chariot",
        "Strength",
        "The Hermit",
        "Wheel of Fortune",
        "Justice",
        "The Hanged Man",
        "Death",
        "Temperance",
        "The Devil",
        "The Tower",
        "The Star",
        "The Moon",
        "The Sun",
        "Judgement",
        "The World"
      ];

      const suits = ["Wands", "Cups", "Swords", "Pentacles"];
      const ranks = [
        "Ace",
        "Two",
        "Three",
        "Four",
        "Five",
        "Six",
        "Seven",
        "Eight",
        "Nine",
        "Ten",
        "Page",
        "Knight",
        "Queen",
        "King"
      ];

      const cardSymbols = {
        "The Fool": "0",
        "The Magician": "I",
        "The High Priestess": "II",
        "The Empress": "III",
        "The Emperor": "IV",
        "The Hierophant": "V",
        "The Lovers": "VI",
        "The Chariot": "VII",
        Strength: "VIII",
        "The Hermit": "IX",
        "Wheel of Fortune": "X",
        Justice: "XI",
        "The Hanged Man": "XII",
        Death: "XIII",
        Temperance: "XIV",
        "The Devil": "XV",
        "The Tower": "XVI",
        "The Star": "XVII",
        "The Moon": "XVIII",
        "The Sun": "XIX",
        Judgement: "XX",
        "The World": "XXI"
      };

      const slugify = (value) =>
        String(value || "")
          .toLowerCase()
          .replace(/&/g, "and")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/(^-|-$)/g, "");

      const cardNames = [
        ...majorArcana,
        ...suits.flatMap((suit) => ranks.map((rank) => `${rank} of ${suit}`))
      ];

      const cardOptions = cardNames.map((name) => ({
        name,
        symbol: cardSymbols[name] || name.split(" ").slice(0, 2).map((part) => part[0]).join(""),
        image: `${cardImageFolder}/${slugify(name)}.jpg`
      }));

      const positionLabels = [
        "Root energy",
        "Visible situation",
        "Block",
        "Support",
        "Action",
        "Likely outcome"
      ];

      const today = new Date().toISOString().slice(0, 10);

      const defaultState = {
        clientName: "Amelia",
        recipientEmail: "amelia@example.com",
        readerName: "Barbara Ford-Hammond",
        readingDate: today,
        deckName: "Placeholder Tarot Deck",
        spreadName: "Six Position Clarity Spread",
        clientQuestion: "What do I need to understand about the change I can feel coming?",
        intention:
          "To offer grounded guidance, emotional clarity, and one practical next step that can be carried into the week.",
        spreadPhotoDataUrl: "",
        spreadPhotoName: "",
        barbarasThoughts: "",
        cards: positionLabels.map((label, index) => ({
          label,
          card: cardOptions[index % cardOptions.length].name,
          interpretation:
            [
              "The root is intuition before explanation. You already know more than you have let yourself name.",
              "The visible situation is softer than it first appears. Growth is present, but it wants care and pacing.",
              "The block is uncertainty that pulls the eye into shadows. Not every unknown is a warning.",
              "Support arrives through balance, patience, and refusing to make one feeling carry the whole truth.",
              "The action is emotional honesty. Begin with the smallest choice that lets your heart breathe.",
              "The likely outcome is steadier ground, especially if you choose what lasts over what merely distracts."
            ][index]
        }))
      };

      const saved = (() => {
        try {
          return JSON.parse(localStorage.getItem("tarotEmailDemoState") || "null");
        } catch (error) {
          return null;
        }
      })();

      let state = saved && saved.cards ? saved : defaultState;

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function paragraphs(value) {
        const text = String(value || "").trim();
        if (!text) return "<p></p>";
        return text
          .split(/\n{2,}/)
          .map((line) => `<p>${escapeHtml(line).replace(/\n/g, "<br>")}</p>`)
          .join("");
      }

      function sentenceList(value) {
        return String(value || "")
          .split(/[.;]\s+|\n+/)
          .map((item) => item.trim())
          .filter(Boolean)
          .slice(0, 3);
      }

      function findCard(name) {
        const typedName = String(name || "").trim() || "Untitled card";
        const knownCard = cardOptions.find(
          (card) => card.name.toLowerCase() === typedName.toLowerCase()
        );
        if (knownCard) return knownCard;

        return {
          name: typedName,
          symbol:
            typedName
              .split(/\s+/)
              .map((part) => part[0])
              .join("")
              .slice(0, 3)
              .toUpperCase() || "*",
          image: `${cardImageFolder}/${slugify(typedName)}.jpg`
        };

      function pdfEscape(value) {
        return normalizePdfText(value)
          .replace(/\\/g, "\\\\")
          .replace(/\(/g, "\\(")
          .replace(/\)/g, "\\)")
          .replace(/[\r\n]+/g, " ");
      }

      function normalizePdfText(value) {
        return String(value || "")
          .replace(/[\u2018\u2019\u201A\u201B]/g, "'")
          .replace(/[\u201C\u201D\u201E\u201F]/g, '"')
          .replace(/[\u2013\u2014]/g, "-")
          .replace(/\u2026/g, "...")
          .replace(/\u00A0/g, " ")
          .replace(/([.!?])(?=[A-Z])/g, "$1 ")
          .replace(/[\u0000-\u001F\u007F-\u009F]/g, " ");
      }

      function pdfParagraphs(value) {
        const chunks = normalizePdfText(value || " ")
          .split(/\n{2,}/)
          .map((paragraph) => paragraph.trim())
          .filter(Boolean);
        const paragraphs = [];
        chunks.forEach((paragraph) => {
          if (paragraph.length < 560) {
            paragraphs.push(paragraph);
            return;
          }
          const sentences = [];
          let start = 0;
          for (let index = 0; index < paragraph.length; index += 1) {
            const char = paragraph[index];
            const next = paragraph[index + 1] || "";
            if ((char === "." || char === "!" || char === "?") && /\s/.test(next)) {
              sentences.push(paragraph.slice(start, index + 1).trim());
              start = index + 1;
            }
          }
          const tail = paragraph.slice(start).trim();
          if (tail) sentences.push(tail);

          let group = "";
          sentences.forEach((sentence) => {
            const next = group ? `${group} ${sentence}` : sentence;
            if (next.length > 520 && group) {
              paragraphs.push(group);
              group = sentence;
            } else {
              group = next;
            }
          });
          if (group) paragraphs.push(group);
        });
        return paragraphs.length ? paragraphs : [" "];
      }

      function wrapPdfText(text, maxChars) {
        const words = String(text || " ").split(/\s+/).filter(Boolean);
        const lines = [];
        let line = "";
        words.forEach((word) => {
          const next = line ? `${line} ${word}` : word;
          if (next.length > maxChars && line) {
            lines.push(line);
            line = word;
          } else {
            line = next;
          }
        });
        if (line) lines.push(line);
        return lines.length ? lines : [" "];
      }

      function jpegBytesFromDataUrl(dataUrl) {
        if (!dataUrl || !dataUrl.startsWith("data:image/jpeg")) return null;
        const binary = atob(dataUrl.split(",")[1] || "");
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
        return bytes;
      }

      async function jpegBytesFromUrl(url) {
        const response = await fetch(url, { cache: "force-cache" });
        const buffer = await response.arrayBuffer();
        return new Uint8Array(buffer);
      }

      async function imageSize(dataUrl) {
        return new Promise((resolve) => {
          if (!dataUrl) return resolve(null);
          const image = new Image();
          image.onload = () => resolve({ width: image.naturalWidth || image.width, height: image.naturalHeight || image.height });
          image.onerror = () => resolve(null);
          image.src = dataUrl;
        });
      }

      async function imageToJpegDataUrl(dataUrl) {
        if (!dataUrl || dataUrl.startsWith("data:image/jpeg")) return dataUrl;
        const size = await imageSize(dataUrl);
        if (!size) return "";
        return new Promise((resolve) => {
          const image = new Image();
          image.onload = () => {
            const canvas = document.createElement("canvas");
            canvas.width = size.width;
            canvas.height = size.height;
            const context = canvas.getContext("2d");
            context.fillStyle = "#fffaf8";
            context.fillRect(0, 0, canvas.width, canvas.height);
            context.drawImage(image, 0, 0);
            resolve(canvas.toDataURL("image/jpeg", 0.9));
          };
          image.onerror = () => resolve("");
          image.src = dataUrl;
        });
      }

      function bytesToBinary(bytes) {
        let output = "";
        const chunk = 8192;
        for (let index = 0; index < bytes.length; index += chunk) {
          output += String.fromCharCode.apply(null, bytes.subarray(index, index + chunk));
        }
        return output;
      }

      async function makePdfBlob() {
        const pageWidth = 595;
        const pageHeight = 842;
        const margin = 54;
        const contentWidth = pageWidth - margin * 2;
        const headerImageUrl = "https://barbfh-rgb.github.io/tarot-reading-composer/pentagram-header.jpg";
        const headerImageBytes = await jpegBytesFromUrl(headerImageUrl);
        const headerImageSize = await imageSize(headerImageUrl);
        const spreadPhotoJpeg = await imageToJpegDataUrl(state.spreadPhotoDataUrl);
        const spreadPhotoBytes = jpegBytesFromDataUrl(spreadPhotoJpeg);
        const spreadPhotoSize = await imageSize(spreadPhotoJpeg);
        const pages = [];
        let ops = [];
        let y = 0;

        const newPage = () => {
          if (ops.length) pages.push(ops.join("\n"));
          ops = [
            "1 0.98 0.973 rg",
            `0 0 ${pageWidth} ${pageHeight} re f`,
            "0.984 0.949 0.863 rg",
            `34 34 ${pageWidth - 68} ${pageHeight - 68} re f`,
            "0.839 0.718 0.412 RG",
            `34 34 ${pageWidth - 68} ${pageHeight - 68} re S`
          ];
          y = pageHeight - margin;
        };
        const text = (value, x, size, font = "F1") => {
          ops.push(`BT /${font} ${size} Tf ${x} ${y} Td (${pdfEscape(value)}) Tj ET`);
        };
        const textWidth = (value, size, font = "F1") => {
          const factor = font === "F2" ? 0.5 : 0.48;
          return String(value || "").length * size * factor;
        };
        const wrapLines = (value, size, maxWidth, font = "F1") => {
          const paragraphsToWrap = pdfParagraphs(value || " ");
          const lines = [];
          paragraphsToWrap.forEach((paragraph, paragraphIndex) => {
            const words = paragraph.replace(/\n/g, " ").split(/\s+/).filter(Boolean);
            let line = "";
            words.forEach((word) => {
              const next = line ? `${line} ${word}` : word;
              if (textWidth(next, size, font) > maxWidth && line) {
                lines.push(line);
                line = word;
              } else {
                line = next;
              }
            });
            if (line) lines.push(line);
            if (paragraphIndex < paragraphsToWrap.length - 1) lines.push("");
          });
          return lines.length ? lines : [" "];
        };
        const ensureSpace = (height) => {
          if (y - height < margin + 8) newPage();
        };
        const wrapped = (value, x, size, lineHeight, maxWidth, font = "F1", after = 8) => {
          wrapLines(value, size, maxWidth, font).forEach((line) => {
            ensureSpace(line ? lineHeight + 2 : lineHeight);
            text(line, x, size, font);
            y -= lineHeight;
          });
          y -= after;
        };
        const drawLine = (x, lineY, width = 120) => {
          ops.push("0.616 0.471 0.149 RG", `${x} ${lineY} m ${x + width} ${lineY} l S`);
        };
        const heading = (value) => {
          ensureSpace(42);
          ops.push("0.227 0.133 0.094 rg");
          text(value, margin, 20, "F2");
          y -= 12;
          drawLine(margin, y);
          y -= 24;
        };
        const framedSection = (title, value, options = {}) => {
          const x = margin;
          const width = contentWidth;
          const titleSize = options.titleSize || 20;
          const bodySize = options.bodySize || 11.7;
          const lineHeight = options.lineHeight || 18;
          const titleLines = wrapLines(title, titleSize, width - 38, "F2");
          const bodyLines = wrapLines(value, bodySize, width - 38, "F1");
          const boxHeight = 42 + titleLines.length * 24 + bodyLines.length * lineHeight + 22;
          ensureSpace(Math.min(boxHeight, pageHeight - margin * 2));
          if (boxHeight > pageHeight - margin * 2) {
            heading(title);
            ops.push("0.227 0.133 0.094 rg");
            wrapped(value, margin, bodySize, lineHeight, contentWidth, "F1", 20);
            return;
          }
          ops.push("1 0.992 0.969 rg", `${x} ${y - boxHeight} ${width} ${boxHeight} re f`);
          ops.push("0.839 0.718 0.412 RG", `${x} ${y - boxHeight} ${width} ${boxHeight} re S`);
          y -= 24;
          ops.push("0.227 0.133 0.094 rg");
          titleLines.forEach((line) => {
            text(line, x + 18, titleSize, "F2");
            y -= 24;
          });
          drawLine(x + 18, y + 8, 130);
          y -= 14;
          ops.push("0.227 0.133 0.094 rg");
          bodyLines.forEach((line) => {
            text(line, x + 18, bodySize, "F1");
            y -= lineHeight;
          });
          y -= 42;
        };
        const drawHeader = () => {
          ops.push("1 0.98 0.973 rg", `0 ${pageHeight - 210} ${pageWidth} 210 re f`);
          if (headerImageBytes && headerImageSize) {
            const emblemSize = 78;
            const emblemX = (pageWidth - emblemSize) / 2;
            const emblemY = pageHeight - 118;
            ops.push("q", `${emblemSize} 0 0 ${emblemSize} ${emblemX} ${emblemY} cm`, "/ImHeader Do", "Q");
            ops.push("0.616 0.471 0.149 RG", `${emblemX - 4} ${emblemY - 4} ${emblemSize + 8} ${emblemSize + 8} re S`);
          }
          y = pageHeight - 156;
          ops.push("0.227 0.133 0.094 rg");
          const title = "Your Reading with Barbara";
          text(title, (pageWidth - textWidth(title, 32, "F2")) / 2, 32, "F2");
          ops.push("0.616 0.471 0.149 RG", `188 ${pageHeight - 180} m 408 ${pageHeight - 180} l S`);
          y = pageHeight - 230;
        };

        newPage();
        drawHeader();
        framedSection("Query or Question", state.clientQuestion);
        framedSection("Intention", state.intention);

        let spreadImageObjectNumber = null;
        let headerImageObjectNumber = null;
        let imageMeta = null;
        if (spreadPhotoBytes && spreadPhotoSize) {
          if (y < pageHeight - 300) newPage();
          heading("Your Cards");
          imageMeta = { bytes: spreadPhotoBytes, width: spreadPhotoSize.width, height: spreadPhotoSize.height };
          const boxW = contentWidth;
          const boxH = 260;
          ensureSpace(boxH + 20);
          const ratio = Math.min(boxW / spreadPhotoSize.width, boxH / spreadPhotoSize.height);
          const drawW = spreadPhotoSize.width * ratio;
          const drawH = spreadPhotoSize.height * ratio;
          const drawX = margin + (boxW - drawW) / 2;
          const drawY = y - drawH;
          ops.push("1 0.992 0.969 rg", `${margin - 8} ${drawY - 8} ${contentWidth + 16} ${drawH + 16} re f`);
          ops.push("0.839 0.718 0.412 RG", `${drawX - 1} ${drawY - 1} ${drawW + 2} ${drawH + 2} re S`);
          ops.push("q", `${drawW} 0 0 ${drawH} ${drawX} ${drawY} cm`, "/Im1 Do", "Q");
          y = drawY - 26;
        }

        state.cards.forEach((card, index) => {
          newPage();
          if (index === 0) {
            heading("What the Cards Are Saying");
          }
          const cardTitle = `${index + 1}. ${card.label}: ${card.card}`;
          const titleLines = wrapLines(cardTitle, 13, contentWidth - 36, "F1");
          const bodyLines = wrapLines(card.interpretation, 11.2, contentWidth - 36, "F1");
          const cardHeight = 38 + titleLines.length * 18 + bodyLines.length * 17 + 22;
          ensureSpace(Math.min(cardHeight, pageHeight - margin * 2));
          if (cardHeight <= pageHeight - margin * 2) {
            ops.push("1 0.992 0.969 rg", `${margin} ${y - cardHeight} ${contentWidth} ${cardHeight} re f`);
            ops.push("0.839 0.718 0.412 RG", `${margin} ${y - cardHeight} ${contentWidth} ${cardHeight} re S`);
            y -= 24;
            ops.push("0.616 0.471 0.149 rg");
            titleLines.forEach((line) => {
              text(line, margin + 18, 13, "F1");
              y -= 18;
            });
            y -= 4;
            ops.push("0.227 0.133 0.094 rg");
            bodyLines.forEach((line) => {
              text(line, margin + 18, 11.2, "F1");
              y -= 17;
            });
            y -= 42;
            return;
          }
          ops.push("0.616 0.471 0.149 rg");
          wrapped(cardTitle, margin, 13, 18, contentWidth, "F1", 6);
          ops.push("0.227 0.133 0.094 rg");
          wrapped(card.interpretation, margin, 11.2, 17, contentWidth, "F1", 20);
        });

        if (state.barbarasThoughts.trim()) {
          if (y < pageHeight - 260) newPage();
          framedSection("Barbara's thoughts", state.barbarasThoughts, { bodySize: 11.7, lineHeight: 18 });
        }
        pages.push(ops.join("\n"));

        const objects = [];
        const addObject = (content) => {
          objects.push(content);
          return objects.length;
        };
        const catalogNumber = addObject("<< /Type /Catalog /Pages 2 0 R >>");
        const pagesNumber = addObject("PAGES_PLACEHOLDER");
        const font1Number = addObject("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>");
        const font2Number = addObject("<< /Type /Font /Subtype /Type1 /BaseFont /Times-Roman >>");
        if (headerImageBytes && headerImageSize) {
          headerImageObjectNumber = addObject(`<< /Type /XObject /Subtype /Image /Width ${headerImageSize.width} /Height ${headerImageSize.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${headerImageBytes.length} >>\nstream\n${bytesToBinary(headerImageBytes)}\nendstream`);
        }
        if (imageMeta) {
          spreadImageObjectNumber = addObject(`<< /Type /XObject /Subtype /Image /Width ${imageMeta.width} /Height ${imageMeta.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${imageMeta.bytes.length} >>\nstream\n${bytesToBinary(imageMeta.bytes)}\nendstream`);
        }
        const pageNumbers = [];
        pages.forEach((pageOps) => {
          const contentNumber = addObject(`<< /Length ${pageOps.length} >>\nstream\n${pageOps}\nendstream`);
          const xObjects = [
            headerImageObjectNumber ? `/ImHeader ${headerImageObjectNumber} 0 R` : "",
            spreadImageObjectNumber ? `/Im1 ${spreadImageObjectNumber} 0 R` : ""
          ].filter(Boolean).join(" ");
          const xObject = xObjects ? `/XObject << ${xObjects} >>` : "";
          const pageNumber = addObject(`<< /Type /Page /Parent ${pagesNumber} 0 R /MediaBox [0 0 ${pageWidth} ${pageHeight}] /Resources << /Font << /F1 ${font1Number} 0 R /F2 ${font2Number} 0 R >> ${xObject} >> /Contents ${contentNumber} 0 R >>`);
          pageNumbers.push(pageNumber);
        });
        objects[pagesNumber - 1] = `<< /Type /Pages /Kids [${pageNumbers.map((number) => `${number} 0 R`).join(" ")}] /Count ${pageNumbers.length} >>`;

        let pdf = "%PDF-1.4\n";
        const offsets = [0];
        objects.forEach((object, index) => {
          offsets.push(pdf.length);
          pdf += `${index + 1} 0 obj\n${object}\nendobj\n`;
        });
        const xref = pdf.length;
        pdf += `xref\n0 ${objects.length + 1}\n0000000000 65535 f \n`;
        offsets.slice(1).forEach((offset) => {
          pdf += `${String(offset).padStart(10, "0")} 00000 n \n`;
        });
        pdf += `trailer\n<< /Size ${objects.length + 1} /Root ${catalogNumber} 0 R >>\nstartxref\n${xref}\n%%EOF`;
        const bytes = new Uint8Array(pdf.length);
        for (let index = 0; index < pdf.length; index += 1) bytes[index] = pdf.charCodeAt(index) & 255;
        return new Blob([bytes], { type: "application/pdf" });
      }

      async function downloadPdfFile() {
        setStatus("Creating PDF...");
        const blob = await makePdfBlob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "your-reading-with-barbara.pdf";
        link.click();
        URL.revokeObjectURL(url);
        setStatus("PDF downloaded");
      }

      async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const area = document.createElement("textarea");
        area.value = text;
        area.setAttribute("readonly", "");
        area.style.position = "fixed";
        area.style.opacity = "0";
        document.body.append(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }

      document.querySelector('[data-action="copy-link"]').addEventListener("click", async () => {
        await copyText(window.location.href);
        setStatus("Link copied");
      });

      document.querySelector('[data-action="copy-text"]').addEventListener("click", async () => {
        await copyText(buildEmailText());
        setStatus("Email text copied");
      });

      document.querySelector('[data-action="copy-designed-email"]').addEventListener("click", async () => {
        await copyDesignedEmail();
        setStatus("Designed email copied");
      });

      document.querySelector('[data-action="mail"]').addEventListener("click", () => {
        const subject = encodeURIComponent("Your Reading with Barbara");
        const body = encodeURIComponent(buildEmailText());
        const email = encodeURIComponent(state.recipientEmail || "");
        window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
      });

      document.querySelector('[data-action="pdf"]').addEventListener("click", () => {
        downloadPdfFile();
      });

      bindFields();
      renderCardEditors();
      renderPreview();
    </script>
  </body>
</html>
